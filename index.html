<!DOCTYPE html>
<html lang="en">

<!--
  ============================================================
  Vibe Boilerplate — index.html
  ============================================================
  A dependency-free, locally-runnable HTML/CSS/JS starter.
  No build step. No frameworks. No CDN. Just open and edit.

  CUSTOMISE THIS FILE:
  1. Update <title> and all meta content.
  2. Replace "App Name" with your project name globally.
  3. Add/remove sections to match your layout needs.
  4. Link additional CSS or JS files as needed (local only).
  ============================================================
-->

<head>
  <!-- ─────────────────────────────────────────────
       CHARACTER ENCODING & VIEWPORT
       Always the first two meta tags.
  ───────────────────────────────────────────── -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ─────────────────────────────────────────────
       PRIMARY META
       Update these for every project.
  ───────────────────────────────────────────── -->
  <title>Alles dreht sich weiter</title>
  <meta name="description" content="Alles dreht sich weiter - Tribute to Jutta" />
  <meta name="author" content="Stefan" />

  <!-- ─────────────────────────────────────────────
       OPEN GRAPH / SOCIAL SHARING
       Used by social platforms when your URL is shared.
       Replace all placeholder values.
  ───────────────────────────────────────────── -->
  <meta property="og:title" content="Alles dreht sich weiter" />
  <meta property="og:description" content="Alles dreht sich weiter - Tribute to Jutta" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://phroggar.github.io/AllesDrehtSichWeiter/" />
  <meta property="og:image" content="https://phroggar.github.io/AllesDrehtSichWeiter/assets/icons/og-image.png" />

  <!-- ─────────────────────────────────────────────
       FAVICON
       Place your icon files in /assets/icons/
       SVG favicon is modern and scales perfectly.
  ───────────────────────────────────────────── -->
  <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="assets/icons/icon-512.png" />

  <!-- ─────────────────────────────────────────────
       PWA MANIFEST (OPTIONAL)
       Remove this line if you are not using PWA features.
       See manifest.json and service-worker.js for details.
  ───────────────────────────────────────────── -->
  <link rel="manifest" href="manifest.json" />

  <!-- ─────────────────────────────────────────────
       THEME COLOR
       Controls the browser chrome color on mobile.
       Match this to your --color-primary in style.css.
  ───────────────────────────────────────────── -->
  <meta name="theme-color" content="#000000" />

  <!-- ─────────────────────────────────────────────
       STYLESHEET
       Single CSS file. Add more <link> tags here
       if you split your CSS into modules.
  ───────────────────────────────────────────── -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- ─────────────────────────────────────────────
       SKIP LINK
       Allows keyboard users to jump past the nav
       directly to main content. Required for WCAG AA.
       The target is the <main> element below.
  ───────────────────────────────────────────── -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- ═══════════════════════════════════════════
       MAIN CONTENT
       id="main-content" is the skip-link target.
  ═══════════════════════════════════════════ -->
  <div class="background-blur" style="background-image: url('assets/video/alles-dreht-sich-weiter.webp');" aria-hidden="true"></div>

  <main id="main-content">

    <!-- ─────────────────────────────────────────────
         VIDEO SECTION
         The main content of the app: a video player.
    ───────────────────────────────────────────── -->
    <section class="section section--video" aria-labelledby="video-heading">
      <div class="video-container">
        <h1 id="video-heading" class="sr-only">Alles dreht sich weiter</h1>
        <div class="video-player">
          <video id="main-video" controls poster="assets/video/alles-dreht-sich-weiter.webp">
            <source src="assets/video/alles-dreht-sich-weiter.mp4" type="video/mp4">
            Your browser does not support the video tag.
          </video>
        </div>
      </div>
    </section>

  </main>
  <!-- /#main-content -->

  <!-- ─────────────────────────────────────────────
       SCRIPTS
       Placed at the end of <body> so the DOM is
       fully parsed before JS runs. Use type="module"
       if you want ES module import/export syntax.
       (Note: modules require a local server or GitHub
       Pages — they won't run from file:// in some browsers.)
  ───────────────────────────────────────────── -->
  <script src="js/main.js"></script>

  <!--
    PWA SERVICE WORKER REGISTRATION (OPTIONAL)
    Uncomment the block below if you want PWA support.
    See service-worker.js for details and limitations.
  -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker
          .register('./service-worker.js')
          .then(reg  => console.log('[SW] Registered:', reg.scope))
          .catch(err => console.error('[SW] Registration failed:', err));
      });
    }
  </script>

</body>
</html>
